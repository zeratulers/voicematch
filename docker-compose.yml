version: '3.8'

services:
  # 数据库服务 (MySQL)
  db:
    image: mysql:8.0
    container_name: voicematch_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-voicematch123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-voicematch}
      MYSQL_USER: ${MYSQL_USER:-voicematch}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-voicematch123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backend/voicematch.db:/tmp/voicematch.db:ro
    networks:
      - voicematch-network
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=1000
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD:-voicematch123} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # 数据迁移服务（一次性运行）
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voicematch_migrate
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER:-voicematch}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-voicematch123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-voicematch}
    volumes:
      - ./backend/voicematch.db:/app/voicematch.db:ro
    networks:
      - voicematch-network
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo '等待MySQL启动...' &&
        sleep 30 &&
        python scripts/migrate_sqlite_to_mysql.py &&
        echo '数据迁移完成！'
      "
    profiles:
      - migrate

  # MinIO 对象存储服务（可选）
  minio:
    image: minio/minio:latest
    container_name: voicematch_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-voicematch}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-voicematch123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - voicematch-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # 后端API服务
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voicematch_api
    restart: unless-stopped
    environment:
      # 基本应用设置
      APP_NAME: ${APP_NAME:-VoiceMatch术中语音指令播放系统}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-this-in-production}
      
      # 数据库配置
      DATABASE_URL: mysql://${MYSQL_USER:-voicematch}:${MYSQL_PASSWORD:-voicematch123}@db:3306/${MYSQL_DATABASE:-voicematch}
      
      # JWT配置
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-this-in-production}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      
      # CORS配置
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000,http://127.0.0.1}
      
      # 存储配置
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      AUDIO_STORAGE_PATH: ${AUDIO_STORAGE_PATH:-./data/audio}
      
      # MinIO配置
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-voicematch}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-voicematch123}
      MINIO_BUCKET: ${MINIO_BUCKET:-voicematch-audio}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      
      # 文件上传限制
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-52428800}
      MAX_AUDIO_DURATION: ${MAX_AUDIO_DURATION:-300}
      ALLOWED_AUDIO_FORMATS: ${ALLOWED_AUDIO_FORMATS:-wav,mp3,opus,m4a,webm}
      
      # 数据保留配置
      RETENTION_DAYS: ${RETENTION_DAYS:-365}
      
      # 安全配置
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
    ports:
      - "8000:8000"
    volumes:
      - audio_data:/app/data
      - ./backend/voicematch.db:/app/voicematch.db:ro
    networks:
      - voicematch-network
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端Web服务
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voicematch_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - voicematch-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
  minio_data:
  audio_data:

networks:
  voicematch-network:
    driver: bridge
