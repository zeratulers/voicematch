version: '3.8'

services:
  # 数据库服务 (MySQL)
  db:
    image: mysql:8.0
    container_name: voicematch_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-voicematch123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-voicematch}
      MYSQL_USER: ${MYSQL_USER:-voicematch}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-voicematch123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - voicematch-network
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=1000

  # MinIO 对象存储服务（可选）
  minio:
    image: minio/minio:latest
    container_name: voicematch_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-voicematch}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-voicematch123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - voicematch-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # 后端API服务
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voicematch_api
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-voicematch}:${MYSQL_PASSWORD:-voicematch123}@db:3306/${MYSQL_DATABASE:-voicematch}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-this-in-production}
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-this-in-production}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-voicematch}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-voicematch123}
      MINIO_BUCKET: ${MINIO_BUCKET:-voicematch-audio}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    volumes:
      - audio_data:/app/data
    networks:
      - voicematch-network
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端Web服务
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voicematch_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - voicematch-network
    depends_on:
      - api

volumes:
  mysql_data:
  minio_data:
  audio_data:

networks:
  voicematch-network:
    driver: bridge
