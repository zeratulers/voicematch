name: Production Docker Build

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        default: 'latest'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Create deployment manifest
        run: |
          cat > deployment.yml << EOF
          # VoiceMatch Production Deployment
          # Generated on: $(date)
          # Version: ${{ steps.version.outputs.version }}
          # Images:
          # Backend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ steps.version.outputs.version }}
          # Frontend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.version.outputs.version }}
          
          version: '3.8'
          
          services:
            db:
              image: mysql:8.0
              container_name: voicematch_db
              restart: unless-stopped
              environment:
                MYSQL_ROOT_PASSWORD: \${MYSQL_ROOT_PASSWORD:-voicematch123}
                MYSQL_DATABASE: \${MYSQL_DATABASE:-voicematch}
                MYSQL_USER: \${MYSQL_USER:-voicematch}
                MYSQL_PASSWORD: \${MYSQL_PASSWORD:-voicematch123}
              ports:
                - "3306:3306"
              volumes:
                - mysql_data:/var/lib/mysql
              networks:
                - voicematch-network
              command: >
                --character-set-server=utf8mb4
                --collation-server=utf8mb4_unicode_ci
                --max_connections=1000
          
            api:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ steps.version.outputs.version }}
              container_name: voicematch_api
              restart: unless-stopped
              environment:
                DATABASE_URL: mysql+aiomysql://\${MYSQL_USER:-voicematch}:\${MYSQL_PASSWORD:-voicematch123}@db:3306/\${MYSQL_DATABASE:-voicematch}
                JWT_SECRET_KEY: \${JWT_SECRET_KEY}
                SECRET_KEY: \${SECRET_KEY}
                STORAGE_BACKEND: \${STORAGE_BACKEND:-local}
                DEBUG: false
              ports:
                - "8000:8000"
              volumes:
                - audio_data:/app/data
              networks:
                - voicematch-network
              depends_on:
                - db
          
            web:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.version.outputs.version }}
              container_name: voicematch_web
              restart: unless-stopped
              ports:
                - "80:80"
                - "443:443"
              volumes:
                - ./nginx.conf:/etc/nginx/nginx.conf:ro
              networks:
                - voicematch-network
              depends_on:
                - api
          
          volumes:
            mysql_data:
            audio_data:
          
          networks:
            voicematch-network:
              driver: bridge
          EOF
          
          echo "Deployment manifest created: deployment.yml"

      - name: Upload deployment manifest
        uses: actions/upload-artifact@v4
        with:
          name: deployment-manifest
          path: deployment.yml

      - name: Output deployment info
        run: |
          echo "=========================================="
          echo "🚀 VoiceMatch Production Build Complete!"
          echo "=========================================="
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Backend Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ steps.version.outputs.version }}"
          echo "Frontend Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.version.outputs.version }}"
          echo ""
          echo "To deploy on VPS:"
          echo "1. Download deployment.yml from artifacts"
          echo "2. Run: docker-compose -f deployment.yml up -d"
          echo "=========================================="
